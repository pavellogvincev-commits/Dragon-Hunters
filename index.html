<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Драконьеры - Полный Прототип</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- СТАРТОВЫЙ ЭКРАН -->
    <div id="start-screen" class="modal" style="display:block; z-index: 1000; width: 320px;">
        <h2 style="color:#f1c40f; margin-bottom: 20px;">🐉 ДРАКОНЬЕРЫ</h2>
        <p style="margin-bottom: 20px;">Выберите количество противников:</p>
        <button class="start-btn" onclick="startGame(1)">1 Бот (Игра вдвоем)</button>
        <button class="start-btn" onclick="startGame(2)">2 Бота (Игра втроем)</button>
        <button class="start-btn" onclick="startGame(3)">3 Бота (Игра вчетвером)</button>
    </div>

    <!-- ИГРОВОЙ ИНТЕРФЕЙС (Изначально скрыт) -->
    <div id="game-ui" style="display: none;">
        <header>
            <h1>🐉 Драконьеры</h1>
            <div id="action-header" style="background: #e67e22; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-weight: bold;"></div>
            <h3 id="round-info">Раунд 1/5 | Ваш ход</h3>
        </header>

        <div class="inventories" id="inventories-board"></div>
        <div class="contracts-area" id="contracts-board"></div>
        <div id="game-board" class="board"></div>

        <div class="hand-area" id="hand-area">
            <h3>Ваша команда:</h3>
            <div id="player-disks" style="display: flex; gap: 10px;"></div>
        </div>
        
        <button class="action-button" id="resolve-btn" onclick="resolvePhaseAsync()">🚀 ЗАПУСТИТЬ ФАЗУ ИСХОДА</button>
        <button class="action-button" id="next-round-btn" onclick="nextRound()" style="display:none; background:#27ae60;">В СЛЕДУЮЩИЙ РАУНД ➡️</button>

        <div class="battle-log" id="battle-log"></div>
    </div>

    <!-- Модалки (Треуголка, Цвет, Очки) -->
    <div id="upgrade-modal" class="modal">
        <h3>Кого усилить (+1)?</h3>
        <div id="upgrade-options" style="display:flex; gap:10px; justify-content:center;"></div>
        <button onclick="cancelUpgrade()" style="margin-top:15px; padding:5px 10px; cursor:pointer;">Отказаться</button>
    </div>

    <div id="color-modal" class="modal">
        <h3>В какой цвет перекрасить?</h3>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:10px;">
            <button class="color-btn red" onclick="applyColor('red')">Красный</button>
            <button class="color-btn green" onclick="applyColor('green')">Зеленый</button>
            <button class="color-btn yellow" onclick="applyColor('yellow')">Желтый</button>
            <button class="color-btn purple" onclick="applyColor('purple')">Фиолетовый</button>
            <button class="color-btn white" onclick="document.getElementById('color-modal').style.display='none'" style="color:black;">Отмена</button>
        </div>
    </div>

    <div id="score-modal" class="modal" style="width: 80%; max-width: 800px;">
        <h2 style="color:#f1c40f; margin-bottom:20px;">🏆 КОНЕЦ ИГРЫ: ИТОГИ 🏆</h2>
        <table id="score-table">
            <thead>
                <tr>
                    <th>Игрок</th>
                    <th title="Сила команды (Максимум дает +6 корон)">💪 Сила Команды</th>
                    <th>🐉 За Драконов</th>
                    <th>📜 За Контракты</th>
                    <th>💎 За Сокровища</th>
                    <th>✨ БОНУС (Сила)</th>
                    <th style="color:#f1c40f;">👑 ИТОГ</th>
                </tr>
            </thead>
            <tbody id="score-body"></tbody>
        </table>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; font-weight:bold; cursor:pointer; background:#3498db; color:white; border:none; border-radius:5px;">Играть снова</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
