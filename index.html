<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Драконьеры - Полный Прототип</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🐉 Драконьеры</h1>
        <h3 id="round-info">Раунд 1/5 | Ваш ход (Выберите диск)</h3>
    </header>

    <!-- Инвентарь игроков -->
    <div class="inventories" id="inventories-board">
        <!-- Генерируется скриптом -->
    </div>

    <!-- Зона Контрактов -->
    <div class="contracts-area" id="contracts-board"></div>

    <!-- Игровое Поле -->
    <div id="game-board" class="board"></div>

    <!-- Рука Игрока и Управление -->
    <div class="hand-area" id="hand-area">
        <h3>Ваша команда:</h3>
        <div id="player-disks" style="display: flex; gap: 10px;"></div>
    </div>
    
    <button class="action-button" id="resolve-btn" onclick="resolvePhaseAsync()">🚀 ЗАПУСТИТЬ ФАЗУ ИСХОДА</button>
    <button class="action-button" id="next-round-btn" onclick="nextRound()" style="display:none; background:#27ae60;">В СЛЕДУЮЩИЙ РАУНД ➡️</button>

    <!-- Лог битвы -->
    <div class="battle-log" id="battle-log"></div>

    <script src="app.js"></script>
</body>
</html>
